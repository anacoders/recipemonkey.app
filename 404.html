<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Recipe Monkey</title>
  <meta property="og:title" content="Shared Shopping List — Recipe Monkey" />
  <meta property="og:description" content="Tap to view this shopping list in Recipe Monkey" />
  <meta property="og:type" content="website" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #F8FAFC;
      color: #0F172A;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 380px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; color: #1B2D3E; }
    .subtitle { font-size: 15px; color: #64748B; margin-bottom: 28px; line-height: 1.5; }
    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      margin-bottom: 12px;
      cursor: pointer;
      border: none;
    }
    .btn-primary { background: #1B2D3E; color: #fff; }
    .btn-secondary { background: #F1F5F9; color: #1B2D3E; }
    .btn:last-child { margin-bottom: 0; }
    .hidden { display: none; }
    .not-found { color: #64748B; }
    .not-found h1 { color: #0F172A; }
  </style>
</head>
<body>
  <div class="card" id="share-card" class="hidden">
    <div class="icon">🐵</div>
    <h1>Shared Shopping List</h1>
    <p class="subtitle">Opening in Recipe Monkey...</p>
    <a id="open-btn" class="btn btn-primary hidden" href="#">Open in App</a>
    <a id="store-btn" class="btn btn-secondary hidden"
       href="https://apps.apple.com/app/id6759668476">
      Get Recipe Monkey
    </a>
  </div>

  <div class="card not-found hidden" id="not-found">
    <div class="icon">🐵</div>
    <h1>Page Not Found</h1>
    <p class="subtitle">This page doesn't exist. Looking for Recipe Monkey?</p>
    <a class="btn btn-primary" href="https://apps.apple.com/app/id6759668476">
      Get Recipe Monkey
    </a>
  </div>

  <script>
    (function () {
      var path = window.location.pathname;
      var match = path.match(/^\/shopping\/shared\/([a-f0-9-]+)\/?$/i);

      if (!match) {
        document.getElementById('not-found').classList.remove('hidden');
        return;
      }

      var token = match[1];
      var card = document.getElementById('share-card');
      var openBtn = document.getElementById('open-btn');
      var storeBtn = document.getElementById('store-btn');

      card.classList.remove('hidden');

      // Try custom scheme to open the app
      var appUrl = 'recipemonkey://shopping/shared/' + token;
      window.location.href = appUrl;

      // If still here after 1.5s, the app didn't open — show buttons
      setTimeout(function () {
        card.querySelector('.subtitle').textContent =
          'Tap below to open this list in the app.';
        openBtn.href = appUrl;
        openBtn.classList.remove('hidden');
        storeBtn.classList.remove('hidden');
      }, 1500);
    })();
  </script>
</body>
</html>
