<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe Monkey</title>
  <link rel="icon" type="image/png" href="/assets/images/favicon.png">
  <link rel="apple-touch-icon" href="/assets/images/icon.png">
  <meta property="og:title" content="Shared Shopping List — Recipe Monkey" />
  <meta property="og:description" content="Tap to view this shopping list in Recipe Monkey" />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F8FAFC;
      color: #1E293B;
      line-height: 1.6;
    }
    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 80px 24px;
      text-align: center;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .logo {
      max-width: 320px;
      margin: 0 auto 32px;
    }
    .logo img {
      width: 100%;
      height: auto;
    }
    h1 {
      font-size: 20px;
      font-weight: 600;
      color: #3D4F5F;
      margin-bottom: 12px;
    }
    .subtitle {
      font-size: 16px;
      color: #64748B;
      margin-bottom: 48px;
      line-height: 1.7;
    }
    .btn {
      display: inline-block;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
    }
    .btn-primary {
      background: #3D4F5F;
      color: #fff;
    }
    .btn-secondary {
      background: #E2E8F0;
      color: #3D4F5F;
    }
    .buttons {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-bottom: 48px;
    }
    .hidden { display: none; }
    .legal-links {
      border-top: 1px solid #E2E8F0;
      padding-top: 32px;
      margin-top: auto;
    }
    .legal-links a {
      color: #536E81;
      text-decoration: none;
      font-size: 14px;
      margin: 0 16px;
    }
    .legal-links a:hover {
      text-decoration: underline;
    }
    .contact {
      margin-top: 24px;
      font-size: 13px;
      color: #94A3B8;
    }
    .contact a {
      color: #536E81;
      text-decoration: none;
    }
    .contact a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo"><img src="/assets/images/logo.png" alt="Recipe Monkey"></div>

    <!-- Shared list view -->
    <div id="share-card" class="hidden">
      <h1>Shared Shopping List</h1>
      <p class="subtitle">Opening in Recipe Monkey...</p>
      <div class="buttons">
        <a id="open-btn" class="btn btn-primary hidden" href="#">Open in App</a>
        <a id="store-btn" class="btn btn-secondary hidden"
           href="https://apps.apple.com/app/id6759668476">Get Recipe Monkey</a>
      </div>
    </div>

    <!-- Generic 404 -->
    <div id="not-found" class="hidden">
      <h1>Page Not Found</h1>
      <p class="subtitle">This page doesn't exist. Looking for Recipe Monkey?</p>
      <div class="buttons">
        <a class="btn btn-primary" href="https://apps.apple.com/app/id6759668476">Get Recipe Monkey</a>
      </div>
    </div>

    <div class="legal-links">
      <a href="/privacy">Privacy Policy</a>
      <a href="/terms">Terms of Service</a>
    </div>

    <div class="contact">
      <p>Support: <a href="mailto:support@recipemonkey.app">support@recipemonkey.app</a></p>
    </div>
  </div>

  <script>
    (function () {
      var path = window.location.pathname;
      var match = path.match(/^\/shopping\/shared\/([a-f0-9-]+)\/?$/i);

      if (!match) {
        document.getElementById('not-found').classList.remove('hidden');
        return;
      }

      var token = match[1];
      var card = document.getElementById('share-card');
      var openBtn = document.getElementById('open-btn');
      var storeBtn = document.getElementById('store-btn');

      card.classList.remove('hidden');

      // Try custom scheme to open the app
      var appUrl = 'recipemonkey://shopping/shared/' + token;
      window.location.href = appUrl;

      // If still here after 1.5s, the app didn't open — show buttons
      setTimeout(function () {
        card.querySelector('.subtitle').textContent =
          'Tap below to open this list in the app.';
        openBtn.href = appUrl;
        openBtn.classList.remove('hidden');
        storeBtn.classList.remove('hidden');
      }, 1500);
    })();
  </script>
</body>
</html>
